<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Not Found 💔</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Georgia&display=swap" rel="stylesheet">
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-message">Oops! This surprise wasn't found 💔</h1>
        <p style="color: #e91e63; font-size: 1.1rem; margin-bottom: 30px;">
            The romantic surprise you're looking for doesn't exist or has been removed.
        </p>
        <a href="{{ url_for('index') }}" class="btn" style="font-size: 1.1rem; padding: 15px 40px;">
            Create a New Surprise 💕
        </a>
    </div>

    <script>
        // Create floating broken hearts
        function createBrokenHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '💔';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * window.innerWidth + 'px';
            heart.style.top = window.innerHeight + 'px';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            heart.style.opacity = Math.random() * 0.4 + 0.2;
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '1';
            document.body.appendChild(heart);

            const duration = Math.random() * 3000 + 2000;
            const startTime = Date.now();

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = elapsed / duration;

                if (progress < 1) {
                    heart.style.transform = `translateY(-${window.innerHeight * progress}px) rotate(${-progress * 180}deg)`;
                    heart.style.opacity = (1 - progress) * 0.4;
                    requestAnimationFrame(animate);
                } else {
                    heart.remove();
                }
            }

            animate();
        }

        // Create broken hearts periodically
        setInterval(createBrokenHeart, 2000);
    </script>
</body>
</html>
